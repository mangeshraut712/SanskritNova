version: '3.9'

services:
  sanskritnova-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '8000:8000'
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=openai/gpt-4.1-mini
      - OPENROUTER_APP_NAME=SanskritNova AI
      - OPENROUTER_APP_URL=http://localhost
    volumes:
      - ../data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "from urllib.request import urlopen; urlopen('http://localhost:8000/api/health').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ../public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sanskritnova-api
    restart: unless-stopped
