name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  checks:
    name: Syntax And Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest

      - name: Compile source
        run: python -m compileall code

      - name: Run tests when present
        run: |
          if find tests -name 'test_*.py' | grep -q .; then
            pytest tests
          else
            echo "No tests found"
          fi
