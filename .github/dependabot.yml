version: 2
updates:
  # Python dependencies
  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'mangeshraut712'
    assignees:
      - 'mangeshraut712'
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps-dev'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'mangeshraut712'
    assignees:
      - 'mangeshraut712'
    commit-message:
      prefix: 'ci'
      include: 'scope'

  # Docker
  - package-ecosystem: 'docker'
    directory: '/docker'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 3
    reviewers:
      - 'mangeshraut712'
    assignees:
      - 'mangeshraut712'
    commit-message:
      prefix: 'docker'
      include: 'scope'
