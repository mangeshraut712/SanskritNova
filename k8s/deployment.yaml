apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanskritnova-ai
  labels:
    app: sanskritnova-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sanskritnova-ai
  template:
    metadata:
      labels:
        app: sanskritnova-ai
    spec:
      containers:
        - name: api
          image: ghcr.io/mangeshraut712/sanskritnova:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sanskritnova-secrets
                  key: openrouter-api-key
            - name: OPENROUTER_MODEL
              value: "openai/gpt-4.1-mini"
            - name: OPENROUTER_APP_NAME
              value: "SanskritNova AI"
            - name: OPENROUTER_APP_URL
              value: "https://your-domain.example"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sanskritnova-ai
spec:
  selector:
    app: sanskritnova-ai
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
